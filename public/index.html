<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DNA x TiK Liikuntahaaste</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #fc4c02;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .label {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.75;
    }

    .km-row {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .km {
      font-size: 7rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .unit {
      font-size: 2.5rem;
      font-weight: 400;
      opacity: 0.8;
    }

    .since {
      font-size: 0.95rem;
      opacity: 0.65;
    }

    .updated {
      font-size: 0.8rem;
      opacity: 0.45;
      margin-top: 8px;
    }

    .progress-wrap {
      width: min(480px, 90vw);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .progress-bar-bg {
      width: 100%;
      height: 12px;
      background: rgba(255,255,255,0.25);
      border-radius: 6px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: white;
      border-radius: 6px;
      width: 0%;
      transition: width 1s ease;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      opacity: 0.75;
    }

    .error {
      font-size: 1rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="label">DNA x TiK Liikuntahaaste</div>
  <div class="km-row">
    <span class="km" id="km">—</span>
    <span class="unit">km</span>
  </div>
  <div class="since">Since March 1, 2026</div>
  <div class="progress-wrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    <div class="progress-label">
      <span id="progress-text">0 / 30 000 km</span>
      <span id="progress-pct">0 %</span>
    </div>
  </div>
  <div class="updated" id="updated"></div>

  <script>
    const GOAL = 30000;
    fetch("/api/stats")
      .then((r) => r.json())
      .then((data) => {
        if (data.error) {
          document.getElementById("km").textContent = "?";
          document.getElementById("updated").textContent = data.error;
          return;
        }
        const total = data.grandTotalKm;
        document.getElementById("km").textContent =
          total.toLocaleString("fi-FI", {
            minimumFractionDigits: 1,
            maximumFractionDigits: 1,
          });
        const pct = Math.min((total / GOAL) * 100, 100);
        document.getElementById("progress-fill").style.width = pct + "%";
        document.getElementById("progress-text").textContent =
          total.toLocaleString("fi-FI", { maximumFractionDigits: 1 }) +
          " / 30 000 km";
        document.getElementById("progress-pct").textContent =
          pct.toLocaleString("fi-FI", { maximumFractionDigits: 1 }) + " %";
        if (data.lastUpdated) {
          document.getElementById("updated").textContent =
            "Updated " + new Date(data.lastUpdated).toLocaleString("fi-FI");
        }
      })
      .catch(() => {
        document.getElementById("km").textContent = "?";
        document.getElementById("updated").textContent = "Could not load data";
      });
  </script>
</body>
</html>
